name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    container:
      image: dolfinx/dolfinx:stable
    steps:
      - uses: actions/checkout@v4
      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,analysis]
      - name: Ruff
        run: ruff check --select E9,F63,F7,F82 src/rsd tests
      - name: Pytest
        # Los tests `slow` quedan para el workflow HPC programado
        run: python -m pytest -q -m "not slow"
