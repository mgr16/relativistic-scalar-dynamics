name: Core CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install lightweight dependencies
        # UFL es liviano y varios módulos NumPy/reference lo importan para
        # compartir la definición simbólica del potencial. No instalar las
        # dependencias pesadas (mpi4py/petsc4py/gmsh): este job solo corre
        # los tests "core".
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy PyYAML pytest ruff fenics-ufl
          python -m pip install -e . --no-deps
      - name: Lint
        run: |
          ruff check --select E9,F63,F7,F82 src/rsd tests
      - name: Run core test suite
        run: |
          python -m pytest -q -m "not requires_dolfinx and not slow and not mpi"
