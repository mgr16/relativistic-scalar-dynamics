name: Core CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install lightweight dependencies
        # No instalar las dependencias pesadas (mpi4py/petsc4py/gmsh): el
        # runner no tiene MPI ni PETSc y este job solo corre los tests "core".
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy PyYAML pytest ruff
          pip install -e . --no-deps
      - name: Lint
        run: |
          ruff check --select E9,F63,F7,F82 src/psyop tests
      - name: Run core test suite
        run: |
          pytest -q -m "not requires_dolfinx and not slow and not mpi"
